<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World's Tallest Buildings Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    #top { padding: 12px 16px; background: #0f172a; color: #f8fafc; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    #top strong { font-size: 14px; }
    #status { font-size: 12px; opacity: 0.85; }
    #app { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 52px); }
    #sidebar { border-right: 1px solid #e2e8f0; overflow: auto; padding: 12px 12px 80px; background: #f8fafc; }
    #search { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #cbd5e1; margin-bottom: 10px; }
    #list { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .row { border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; background: white; cursor: pointer; }
    .row:hover { background: #e0f2fe; }
    .row .title { font-weight: 650; font-size: 13px; color: #0f172a; }
    .row .meta { font-size: 12px; color: #475569; margin-top: 4px; }
    #map { height: calc(100vh - 52px); width: 100%; }
    @media (max-width: 900px) { #app { grid-template-columns: 1fr; } #sidebar { border-right: none; border-bottom: 1px solid #e2e8f0; } #map { height: 60vh; } }
  </style>
</head>
<body>
  <div id="top">
    <strong>World's Tallest Buildings</strong>
    <div id="status">Loading live data from Wikipedia…</div>
  </div>
  <div id="app">
    <div id="sidebar">
      <input id="search" placeholder="Search building / city / country" />
      <ul id="list"></ul>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('list');
    const searchEl = document.getElementById('search');

    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function clean(text) {
      return (text || '')
        .replace(/\[[^\]]*\]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function parseTallest(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const tables = Array.from(doc.querySelectorAll('table.wikitable'));
      let table = tables.find(t => {
        const headers = Array.from(t.querySelectorAll('th')).map(th => clean(th.textContent).toLowerCase());
        return headers.includes('rank') && headers.some(h => h.includes('building') || h.includes('name'));
      }) || tables[0];

      const rows = Array.from(table.querySelectorAll('tbody tr'));
      const out = [];

      for (const tr of rows) {
        const cells = Array.from(tr.querySelectorAll('td'));
        if (cells.length < 5) continue;

        const rank = parseInt(cells[0].textContent, 10);
        if (!Number.isFinite(rank) || rank < 1 || rank > 100) continue;

        const nameLink = cells[1].querySelector('a');
        const name = clean(nameLink ? nameLink.textContent : cells[1].textContent);
        const title = nameLink ? clean(nameLink.getAttribute('title')) : name;

        const city = clean(cells[2].textContent);
        const country = clean(cells[3].textContent);
        const heightText = clean(cells[4].textContent);
        const completed = clean(cells[8]?.textContent || cells[7]?.textContent || '');

        out.push({ rank, name, title, city, country, heightText, completed, marker: null });
      }

      out.sort((a, b) => a.rank - b.rank);
      return out;
    }

    async function fetchCoordsByTitles(titles) {
      const results = {};
      const chunkSize = 50;

      for (let i = 0; i < titles.length; i += chunkSize) {
        const chunk = titles.slice(i, i + chunkSize);
        const url = 'https://en.wikipedia.org/w/api.php?action=query&format=json&formatversion=2&origin=*'
          + '&prop=coordinates'
          + '&titles=' + encodeURIComponent(chunk.join('|'));

        const res = await fetch(url);
        const data = await res.json();

        if (!data?.query?.pages) continue;
        for (const p of data.query.pages) {
          const title = p.title;
          const c = p.coordinates?.[0];
          if (c && Number.isFinite(c.lat) && Number.isFinite(c.lon)) {
            results[title] = [c.lat, c.lon];
          }
        }
      }

      return results;
    }

    function renderList(items) {
      listEl.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (const item of items) {
        const li = document.createElement('li');
        li.className = 'row';
        const titleLine = document.createElement('div');
        titleLine.className = 'title';
        titleLine.textContent = '#' + item.rank + ' ' + item.name;

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = item.city + ', ' + item.country + ' · ' + item.heightText + ' · completed ' + item.completed;

        li.appendChild(titleLine);
        li.appendChild(meta);

        if (item.marker) {
          li.addEventListener('click', () => {
            map.setView(item.marker.getLatLng(), 10);
            item.marker.openPopup();
          });
        }

        frag.appendChild(li);
      }
      listEl.appendChild(frag);
    }

    (async () => {
      statusEl.textContent = 'Fetching Wikipedia table…';

      const parseUrl = 'https://en.wikipedia.org/w/api.php?action=parse&page=List_of_tallest_buildings&prop=text&format=json&origin=*';
      const parseRes = await fetch(parseUrl);
      const parseJson = await parseRes.json();
      const html = parseJson?.parse?.text?.['*'] || parseJson?.parse?.text || '';

      const items = parseTallest(html);
      statusEl.textContent = 'Fetched top ' + items.length + ' buildings. Getting coordinates…';

      const titles = Array.from(new Set(items.map(x => x.title).filter(Boolean)));
      const coordMap = await fetchCoordsByTitles(titles);

      for (const item of items) {
        const coords = coordMap[item.title];
        if (!coords) continue;

        const popup = '<b>#' + item.rank + ' ' + item.name + '</b><br>'
          + item.city + ', ' + item.country + '<br>'
          + item.heightText + '<br>'
          + 'completed ' + item.completed;

        item.marker = L.marker(coords).addTo(map).bindPopup(popup);
      }

      statusEl.textContent = 'Loaded ' + items.filter(x => x.marker).length + ' markers. Type to search.';
      renderList(items.filter(x => x.marker));

      searchEl.addEventListener('input', () => {
        const q = searchEl.value.toLowerCase();
        renderList(items.filter(x => x.marker && (
          (x.name || '').toLowerCase().includes(q) ||
          (x.city || '').toLowerCase().includes(q) ||
          (x.country || '').toLowerCase().includes(q)
        )));
      });
    })().catch(err => {
      console.error(err);
      statusEl.textContent = 'Error loading data. See console.';
    });
  </script>
</body>
</html>
