<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World's Tallest Buildings Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    :root{--bg:#0f172a;--fg:#f8fafc;--muted:#334155;}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
    #top{background:var(--bg);color:var(--fg);padding:12px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;}
    #brand{font-weight:700;font-size:14px;}
    #status{font-size:12px;opacity:0.95;}
    #app{display:grid;grid-template-columns:390px 1fr;height:calc(100vh - 52px);}
    #controls{border-right:1px solid #e2e8f0;overflow:auto;background:#f8fafc;padding:12px;}
    .row{display:grid;gap:10px;}
    label{font-size:11px;color:var(--muted);}
    input,select{width:100%;padding:8px 10px;border-radius:10px;border:1px solid #cbd5e1;background:#fff;}
    button{padding:8px 10px;border-radius:10px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-weight:600;}
    button.primary{background:#0ea5e9;border-color:#0ea5e9;color:#fff;}
    button:disabled{opacity:0.6;cursor:not-allowed;}
    #summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;}
    .card{border:1px solid #e2e8f0;border-radius:12px;background:#fff;padding:10px;}
    .card .k{font-size:11px;color:var(--muted);}
    .card .v{font-weight:800;}
    #list{margin-top:10px;display:grid;gap:8px;list-style:none;padding:0;}
    .brow{border:1px solid #e2e8f0;border-radius:12px;background:#fff;padding:10px;cursor:pointer;}
    .brow:hover{background:#e0f2fe;}
    .title{font-weight:750;font-size:13px;color:#0f172a;}
    .meta{margin-top:2px;font-size:12px;color:var(--muted);}
    #map{height:calc(100vh - 52px);width:100%;}
    @media (max-width: 980px){
      #app{grid-template-columns:1fr;}
      #controls{border-right:none;border-bottom:1px solid #e2e8f0;}
      #map{height:60vh;}
    }
  </style>
</head>
<body>
  <div id="top">
    <div id="brand">World's Tallest Buildings Dashboard</div>
    <div id="status">Loading…</div>
  </div>
  <div id="app">
    <div id="controls">
      <div class="row">
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button id="reload" class="primary" type="button">Reload live</button>
          <button id="export" type="button" disabled>Export CSV</button>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button id="reset" type="button" disabled>Reset filters</button>
          <button id="clearCache" type="button">Clear cache</button>
        </div>
        <div>
          <label>Search</label>
          <input id="q" placeholder="Building, city, country, function" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <label>Country</label>
            <select id="country"></select>
          </div>
          <div>
            <label>City</label>
            <select id="city"></select>
          </div>
          <div>
            <label>Min height (m)</label>
            <input id="minH" type="number" />
          </div>
          <div>
            <label>Max height (m)</label>
            <input id="maxH" type="number" />
          </div>
          <div>
            <label>Min year</label>
            <input id="minY" type="number" />
          </div>
          <div>
            <label>Max year</label>
            <input id="maxY" type="number" />
          </div>
        </div>
        <div id="summary">
          <div class="card"><div class="k">Buildings</div><div class="v" id="statBuildings">0</div></div>
          <div class="card"><div class="k">Cities</div><div class="v" id="statCities">0</div></div>
          <div class="card"><div class="k">Countries</div><div class="v" id="statCountries">0</div></div>
        </div>
        <ul id="list"></ul>
      </div>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const reloadBtn = document.getElementById('reload');
    const exportBtn = document.getElementById('export');
    const resetBtn = document.getElementById('reset');
    const clearCacheBtn = document.getElementById('clearCache');
    const qInput = document.getElementById('q');
    const countrySel = document.getElementById('country');
    const citySel = document.getElementById('city');
    const minHInput = document.getElementById('minH');
    const maxHInput = document.getElementById('maxH');
    const minYInput = document.getElementById('minY');
    const maxYInput = document.getElementById('maxY');
    const listEl = document.getElementById('list');
    const statBuildings = document.getElementById('statBuildings');
    const statCities = document.getElementById('statCities');
    const statCountries = document.getElementById('statCountries');

    const map = L.map('map').setView([20,0],2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
    let clusterLayer = L.markerClusterGroup();
    map.addLayer(clusterLayer);

    const CACHE_KEY = 'ttb_v1_cache';
    const TTL_MS = 24 * 60 * 60 * 1000;
    let allBuildings = [];
    let filtered = [];
    let liveTs = null;

    function debounced(fn, delay) {
      let t;
      return function (...args) {
        clearTimeout(t);
        t = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    function clean(x) { return (x || '').toString().trim(); }

    function parseCoords(wkt) {
      const m = /Point\(([-0-9\.]+) ([-0-9\.]+)\)/.exec(wkt);
      if (!m) return null;
      const lon = parseFloat(m[1]);
      const lat = parseFloat(m[2]);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
      return { lat, lon };
    }

    function toYear(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr);
      const y = d.getUTCFullYear();
      return Number.isFinite(y) ? y : null;
    }

    function rankTop100(data) {
      const copy = data.slice().filter(d => Number.isFinite(d.heightM));
      copy.sort((a,b) => b.heightM - a.heightM);
      copy.forEach((d,i) => d.rank = i + 1);
      return copy.slice(0, 100);
    }

    function buildSummary(items) {
      statBuildings.textContent = items.length;
      const cities = new Set(items.map(d => d.cityKey));
      const countries = new Set(items.map(d => d.country));
      statCities.textContent = cities.size;
      statCountries.textContent = countries.size;
    }

    function fillOptions(items) {
      const countries = new Set(items.map(d => d.country).filter(Boolean));
      countrySel.innerHTML = '<option value="ALL">All countries</option>' + [...countries].sort().map(c => `<option>${c}</option>`).join('');
      citySel.innerHTML = '<option value="ALL">All cities</option>';
    }

    function applyFilters() {
      const q = qInput.value.toLowerCase();
      const country = countrySel.value;
      const city = citySel.value;
      const minH = parseFloat(minHInput.value);
      const maxH = parseFloat(maxHInput.value);
      const minY = parseInt(minYInput.value, 10);
      const maxY = parseInt(maxYInput.value, 10);

      filtered = allBuildings.filter(d => {
        if (country !== 'ALL' && d.country !== country) return false;
        if (city !== 'ALL' && d.cityKey !== city) return false;
        if (d.rank > 100) return false;
        if (Number.isFinite(minH) && d.heightM < minH) return false;
        if (Number.isFinite(maxH) && d.heightM > maxH) return false;
        if (Number.isFinite(minY) && Number.isFinite(d.year) && d.year < minY) return false;
        if (Number.isFinite(maxY) && Number.isFinite(d.year) && d.year > maxY) return false;
        if (q) {
          const blob = [d.rank, d.name, d.city, d.country, d.functionLabel, d.heightM, d.year].join(' ').toLowerCase();
          if (!blob.includes(q)) return false;
        }
        return true;
      });

      buildSummary(filtered);
      exportBtn.disabled = filtered.length === 0;
      resetBtn.disabled = false;

      clusterLayer.clearLayers();
      filtered.forEach(d => {
        const marker = L.marker([d.coords.lat, d.coords.lon]);
        marker.bindPopup(
          `<b>#${d.rank} ${d.name}</b><br/>${d.city}, ${d.country}<br/>${d.functionLabel}<br/>Height: ${d.heightM.toFixed(1)} m${Number.isFinite(d.floors) ? ` · Floors: ${d.floors}` : ''}${Number.isFinite(d.year) ? ` · Completed: ${d.year}` : ''}`
        );
        marker.__data = d;
        clusterLayer.addLayer(marker);
      });
      renderList();
    }

    function renderList() {
      listEl.innerHTML = '';
      const frag = document.createDocumentFragment();
      filtered.slice(0, 200).forEach(d => {
        const li = document.createElement('li');
        li.className = 'brow';
        li.innerHTML = `<div class="title">#${d.rank} ${d.name}</div><div class="meta">${d.city}, ${d.country} · ${d.functionLabel} · ${d.heightM.toFixed(1)} m · ${Number.isFinite(d.year) ? d.year : 'year unknown'}</div>`;
        li.addEventListener('click', () => {
          map.setView([d.coords.lat, d.coords.lon], 12);
        });
        frag.appendChild(li);
      });
      listEl.appendChild(frag);
    }

    function downloadCsv(rows) {
      const headers = ['rank','name','heightM','country','city','function','year','floors','lat','lon'];
      const lines = [headers.join(',')];
      rows.forEach(d => {
        const vals = [d.rank, d.name, d.heightM, d.country, d.city, d.functionLabel, d.year, d.floors, d.coords.lat, d.coords.lon];
        lines.push(vals.map(x => {
          const s = (x === null || typeof x === 'undefined') ? '' : String(x);
          return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
        }).join(','));
      });
      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'tallest-buildings-filtered.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function loadCachedIfValid() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.data) || typeof parsed.ts !== 'number') return null;
        if (Date.now() - parsed.ts > TTL_MS) return null;
        liveTs = parsed.ts;
        return parsed.data;
      } catch { return null; }
    }

    function saveCache(data) {
      try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {
        // ignore
      }
    }

    async function fetchLive() {
      statusEl.textContent = 'Fetching live data from Wikidata…';
      reloadBtn.disabled = true;
      let data;

      try {
        const query = `PREFIX wdt: <http://www.wikidata.org/prop/direct/>
PREFIX wd: <http://www.wikidata.org/entity/>
PREFIX wikibase: <http://wikiba.se/ontology#>
PREFIX bd: <http://www.bigdata.com/rdf#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
SELECT ?item ?itemLabel ?height ?coords ?countryLabel ?cityLabel ?completed ?floors ?instanceLabel WHERE {
  ?item wdt:P31/wdt:P279* wd:Q811979.
  ?item wdt:P2048 ?height.
  ?item wdt:P625 ?coords.
  ?item wdt:P17 ?country.
  OPTIONAL { ?item wdt:P131 ?city. }
  OPTIONAL { ?item wdt:P576 ?completed. }
  OPTIONAL { ?item wdt:P1101 ?floors. }
  OPTIONAL { ?item wdt:P31 ?instance. }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
  BIND(IF(BOUND(?instance), ?instanceLabel, "") as ?instanceLabel)
  FILTER(?height > 200)
}
ORDER BY DESC(?height)
LIMIT 200`;

        const url = 'https://query.wikidata.org/sparql?format=json&query=' + encodeURIComponent(query);
        const res = await fetch(url, { headers: { 'Accept': 'application/sparql-results+json' } });
        const json = await res.json();

        const rows = (json?.results?.bindings || []).map(b => {
          const coords = parseCoords(b.coords?.value);
          if (!coords) return null;
          const heightM = parseFloat(b.height?.value);
          if (!Number.isFinite(heightM)) return null;
          const year = toYear(b.completed?.value);
          const floors = parseInt(b.floors?.value, 10);
          return {
            name: clean(b.itemLabel?.value),
            heightM,
            coords,
            country: clean(b.countryLabel?.value),
            city: clean(b.cityLabel?.value) || 'Unknown city',
            cityKey: (clean(b.cityLabel?.value) || 'Unknown city') + ' · ' + (clean(b.countryLabel?.value) || ''),
            functionLabel: clean(b.instanceLabel?.value) || 'Building',
            year,
            floors: Number.isFinite(floors) ? floors : null
          };
        }).filter(Boolean);

        const rankedTop100 = rankTop100(rows);
        saveCache(rankedTop100);
        liveTs = Date.now();
        return rankedTop100;
      } finally {
        reloadBtn.disabled = false;
      }
    }

    function init(data) {
      allBuildings = data;
      fillOptions(allBuildings);
      const minH = Math.floor(Math.min(...allBuildings.map(d => d.heightM)));
      const maxH = Math.ceil(Math.max(...allBuildings.map(d => d.heightM)));
      minHInput.value = minH;
      maxHInput.value = maxH;

      const years = allBuildings.map(d => d.year).filter(Number.isFinite);
      const minY = years.length ? Math.min(...years) : 1900;
      const maxY = years.length ? Math.max(...years) : 2100;
      minYInput.value = minY;
      maxYInput.value = maxY;

      applyFilters();
      statusEl.textContent = `Using ${liveTs ? 'cached' : 'live'} data. ${new Date(liveTs || Date.now()).toLocaleString()} local time.`;
    }

    function onCountryChange() {
      const selected = countrySel.value;
      const cities = new Set(
        allBuildings.filter(d => selected === 'ALL' || d.country === selected)
          .map(d => d.cityKey)
      );
      citySel.innerHTML = '<option value="ALL">All cities</option>' + [...cities].sort().map(c => `<option>${c}</option>`).join('');
      citySel.value = 'ALL';
      applyFilters();
    }

    async function bootstrap() {
      const cached = loadCachedIfValid();
      if (cached) {
        init(cached);
      } else {
        const live = await fetchLive();
        init(live);
      }
    }

    bootstrap().catch(err => {
      console.error(err);
      statusEl.textContent = 'Error loading data. See console.';
    });

    reloadBtn.addEventListener('click', async () => {
      const live = await fetchLive();
      init(live);
    });

    clearCacheBtn.addEventListener('click', () => {
      localStorage.removeItem(CACHE_KEY);
      statusEl.textContent = 'Cache cleared. Reload live data.';
    });

    resetBtn.addEventListener('click', () => {
      qInput.value = '';
      countrySel.value = 'ALL';
      citySel.innerHTML = '<option value="ALL">All cities</option>';
      citySel.value = 'ALL';
      if (allBuildings.length) {
        minHInput.value = Math.floor(Math.min(...allBuildings.map(d => d.heightM)));
        maxHInput.value = Math.ceil(Math.max(...allBuildings.map(d => d.heightM)));
        const years = allBuildings.map(d => d.year).filter(Number.isFinite);
        const minY = years.length ? Math.min(...years) : 1900;
        const maxY = years.length ? Math.max(...years) : 2100;
        minYInput.value = minY;
        maxYInput.value = maxY;
      }
      applyFilters();
    });

    exportBtn.addEventListener('click', () => {
      downloadCsv(filtered);
    });

    qInput.addEventListener('input', debounced(applyFilters, 120));
    countrySel.addEventListener('change', onCountryChange);
    citySel.addEventListener('change', applyFilters);
    minHInput.addEventListener('change', applyFilters);
    maxHInput.addEventListener('change', applyFilters);
    minYInput.addEventListener('change', applyFilters);
    maxYInput.addEventListener('change', applyFilters);
  </script>
</body>
</html>
